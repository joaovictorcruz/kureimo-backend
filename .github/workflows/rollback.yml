name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      api_version:
        description: 'Versão da API para reverter (ex: 1.2.3). Deixe em branco para não mexer na API.'
        required: false
        type: string
      worker_version:
        description: 'Versão do Worker para reverter (ex: 1.2.3). Deixe em branco para não mexer no Worker.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - name: Validar entrada
        run: |
          if [ -z "${{ inputs.api_version }}" ] && [ -z "${{ inputs.worker_version }}" ]; then
            echo "::error::Informe pelo menos uma versão (API ou Worker) para reverter."
            exit 1
          fi

  rollback-owner:
    needs: validar
    if: github.actor == 'joaovcrz'
    runs-on: ubuntu-latest
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.36.1'
      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG_B64" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      - name: Rollback API
        if: inputs.api_version != ''
        run: |
          kubectl set image deployment/kureimo-api-p kureimo-api=joaovcrz/hmlkureimoapi:${{ inputs.api_version }} -n kureimo-prod
          kubectl rollout status deployment/kureimo-api-p -n kureimo-prod --timeout=120s
      - name: Rollback Worker
        if: inputs.worker_version != ''
        run: |
          kubectl set image deployment/kureimo-worker-p kureimo-worker=joaovcrz/hmlkureimoworker:${{ inputs.worker_version }} -n kureimo-prod
          kubectl rollout status deployment/kureimo-worker-p -n kureimo-prod --timeout=120s

  rollback-outros:
    needs: validar
    if: github.actor != 'joaovcrz'
    runs-on: ubuntu-latest
    environment: production-rollback
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.36.1'
      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG_B64" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      - name: Rollback API
        if: inputs.api_version != ''
        run: |
          kubectl set image deployment/kureimo-api-p kureimo-api=joaovcrz/hmlkureimoapi:${{ inputs.api_version }} -n kureimo-prod
          kubectl rollout status deployment/kureimo-api-p -n kureimo-prod --timeout=120s
      - name: Rollback Worker
        if: inputs.worker_version != ''
        run: |
          kubectl set image deployment/kureimo-worker-p kureimo-worker=joaovcrz/hmlkureimoworker:${{ inputs.worker_version }} -n kureimo-prod
          kubectl rollout status deployment/kureimo-worker-p -n kureimo-prod --timeout=120s