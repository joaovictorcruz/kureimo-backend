name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy-production:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Bump API Version
        id: api_version
        run: |
          VERSION=$(grep -oP '(?<=<VersionPrefix>).*?(?=</VersionPrefix>)' Kureimo.API/Kureimo.API.csproj)

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH + 1))

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          sed -i "s/<VersionPrefix>$VERSION<\/VersionPrefix>/<VersionPrefix>$NEW_VERSION<\/VersionPrefix>/" Kureimo.API/Kureimo.API.csproj

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Bump Worker Version
        id: worker_version
        run: |
          VERSION=$(grep -oP '(?<=<VersionPrefix>).*?(?=</VersionPrefix>)' Kureimo.Worker/Kureimo.Worker.csproj)

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH + 1))

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          sed -i "s/<VersionPrefix>$VERSION<\/VersionPrefix>/<VersionPrefix>$NEW_VERSION<\/VersionPrefix>/" Kureimo.Worker/Kureimo.Worker.csproj

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit Version Bump
        run: |
          git add Kureimo.API/Kureimo.API.csproj
          git add Kureimo.Worker/Kureimo.Worker.csproj

          git commit -m "chore: bump versions [skip ci]" || echo "No changes"

          git push

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: |
            joaovcrz/hmlkureimoapi:${{ steps.api_version.outputs.version }}
            joaovcrz/hmlkureimoapi:latest

      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            joaovcrz/hmlkureimoworker:${{ steps.worker_version.outputs.version }}
            joaovcrz/hmlkureimoworker:latest

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Redeploy API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway redeploy \
            --service ee1f1a35-820c-4cba-87f9-e31e950c29a0 \
            --environment 212d94e4-2114-4dc8-9237-ccd356677dd3 \
            --project a5934b9c-f3e9-483c-bfff-cd61822f49e9 \
            --yes

      - name: Redeploy Worker
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway redeploy \
            --service ff255d01-f11c-44e6-a42d-823dfa11c528 \
            --environment 212d94e4-2114-4dc8-9237-ccd356677dd3 \
            --project a5934b9c-f3e9-483c-bfff-cd61822f49e9 \
            --yes