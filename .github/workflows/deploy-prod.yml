name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  ci:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    outputs:
      api_version: ${{ steps.api_version.outputs.version }}
      worker_version: ${{ steps.worker_version.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Bump API Version
        id: api_version
        run: |
          VERSION=$(grep -oP '(?<=<VersionPrefix>).*?(?=</VersionPrefix>)' Kureimo.API/Kureimo.API.csproj)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          sed -i "s/<VersionPrefix>$VERSION<\/VersionPrefix>/<VersionPrefix>$NEW_VERSION<\/VersionPrefix>/" Kureimo.API/Kureimo.API.csproj
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Bump Worker Version
        id: worker_version
        run: |
          VERSION=$(grep -oP '(?<=<VersionPrefix>).*?(?=</VersionPrefix>)' Kureimo.Worker/Kureimo.Worker.csproj)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          sed -i "s/<VersionPrefix>$VERSION<\/VersionPrefix>/<VersionPrefix>$NEW_VERSION<\/VersionPrefix>/" Kureimo.Worker/Kureimo.Worker.csproj
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit Version Bump
        run: |
          git add Kureimo.API/Kureimo.API.csproj Kureimo.Worker/Kureimo.Worker.csproj
          git commit -m "chore: bump versions [skip ci]" || echo "No changes"
          git push

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: |
            joaovcrz/hmlkureimoapi:${{ steps.api_version.outputs.version }}
            joaovcrz/hmlkureimoapi:latest

      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            joaovcrz/hmlkureimoworker:${{ steps.worker_version.outputs.version }}
            joaovcrz/hmlkureimoworker:latest

  cd:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.36.1'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > $HOME/.kube/config

      - name: Deploy API
        run: |
          kubectl set image deployment/kureimo-api-p kureimo-api=joaovcrz/hmlkureimoapi:${{ needs.ci.outputs.api_version }} -n kureimo-prod
          kubectl rollout status deployment/kureimo-api-p -n kureimo-prod --timeout=120s

      - name: Deploy Worker
        run: |
          kubectl set image deployment/kureimo-worker-p kureimo-worker=joaovcrz/hmlkureimoworker:${{ needs.ci.outputs.worker_version }} -n kureimo-prod
          kubectl rollout status deployment/kureimo-worker-p -n kureimo-prod --timeout=120s