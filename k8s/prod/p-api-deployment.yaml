apiVersion: apps/v1
kind: Deployment
metadata:
  name: kureimo-api-p
  namespace: kureimo-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kureimo-api-p
  template:
    metadata:
      labels:
        app: kureimo-api-p
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: kureimo-api
          image: joaovcrz/hmlkureimoapi:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
          envFrom:
            - secretRef:
                name: kureimo-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "250Mi"
            limits:
              cpu: "300m"
              memory: "450Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: kureimo-api-svc
  namespace: kureimo-prod
spec:
  selector:
    app: kureimo-api-p
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP